const cleanPunctuation = (str) => str.replace(/[^\u4e00-\u9fa5]/g, '');
const FLASH_DATA = [...RAW_DATA, ...CONVERSATION_DATA];
const rawCharsSet = new Set(RAW_DATA.map(item => cleanPunctuation(item.char)));
const deduplicatedConvData = CONVERSATION_DATA.filter(item => !rawCharsSet.has(cleanPunctuation(item.char)));
const QUIZ_POOL_DATA = [...RAW_DATA, ...deduplicatedConvData];

const CONVERSATIONS_MAP = {};
CONVERSATION_DATA.forEach(item => {
    const match = item.tema.match(/Conversaci[oó]n\s+(\d+)\.(\d+)/i);
    if (match) {
        const convId = match[1];
        if (!CONVERSATIONS_MAP[convId]) CONVERSATIONS_MAP[convId] = [];
        CONVERSATIONS_MAP[convId].push(item);
    }
});

const UNIQUE_LESSONS = [...new Set(RAW_DATA.map(item => item.section))];

const normalizeText = (str) => {
  if (!str) return "";
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¡!¿?]/g, "").trim().replace(/\s+/g, ' ');
};

const parseEspAnswers = (rawEsp) => {
  let text = rawEsp.replace(/\[.*?\]/g, '').trim();
  let alternatives = text.split('/').map(s => s.trim());
  const expandParentheses = (str) => {
      const match = /([\wáéíóúüñÁÉÍÓÚÜÑ]+)\s*\(([\wáéíóúüñÁÉÍÓÚÜÑ\s]+)\)/.exec(str);
      if (!match) return [str];
      const word = match[1]; const synonym = match[2];
      const before = str.substring(0, match.index); const after = str.substring(match.index + match[0].length);
      const opt1 = before + word + after; const opt2 = before + synonym + after;
      return [...expandParentheses(opt1), ...expandParentheses(opt2)];
  };
  let allValidOptions = [];
  alternatives.forEach(alt => { allValidOptions.push(...expandParentheses(alt)); });
  return allValidOptions.map(s => s.replace(/\s+/g, ' ').trim());
};

const checkEspAnswer = (input, targetRawEsp) => {
  const validOptions = parseEspAnswers(targetRawEsp);
  const normalizedInput = normalizeText(input);
  return validOptions.some(opt => normalizeText(opt) === normalizedInput);
};

const comparePinyin = (input, target) => {
  const clean = (s) => s.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¡!¿?]/g, "").split(/\s+/);
  const inputParts = clean(input); const targetParts = clean(target);
  if (inputParts.length !== targetParts.length) return inputParts.join('') === targetParts.join('');
  const getToneBase = (syllable) => {
      const match = syllable.match(/^([a-z]+)(\d)?$/);
      if (!match) return syllable;
      const word = match[1]; const tone = match[2];
      if (!tone || tone === '0' || tone === '5') return word + '0';
      return word + tone; 
  };
  return targetParts.every((t, i) => getToneBase(inputParts[i]) === getToneBase(t));
};

const formatFlashcardEsp = (rawEsp) => {
  if (!rawEsp) return { definitions: [], note: null };
  let text = rawEsp; let note = null;
  const bracketRegex = /\[(.*?)\]/g;
  const matches = [...text.matchAll(bracketRegex)];
  if (matches.length > 0) {
    note = matches.map(m => m[1].trim()).join(' | ');
    text = text.replace(bracketRegex, '').trim();
  }
  const definitions = text.split('/').map(s => s.trim()).filter(s => s !== '');
  return { definitions, note };
};

const getEspPrompt = (esp) => {
    const { definitions, note } = formatFlashcardEsp(esp);
    let prompt = definitions[0];
    if (note) prompt += ` [${note}]`;
    return prompt;
};

const playAudio = (text, rate = 0.85, showAlertFunc) => {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN'; utterance.rate = rate; 
        window.speechSynthesis.speak(utterance);
    } else if (showAlertFunc) { showAlertFunc("Audio no soportado."); }
};

const buildPinyinDisplayArray = (charStr, tildesStr, numStr) => {
  const chars = charStr.split('');
  const numSyllables = numStr.trim().split(' ');
  const tildesArray = Array.from(tildesStr.normalize('NFC'));
  let tildesIdx = 0;
  const result = [];
  const isLetter = (c) => /\p{L}/u.test(c);

  for (let i = 0; i < chars.length; i++) {
      const c = chars[i];
      const isChinese = /[\u4e00-\u9fa5]/.test(c);
      let prefix = ''; let syllable = '';
      if (isChinese) {
          const baseSyllable = numSyllables.shift() || '';
          const baseLen = Array.from(baseSyllable.replace(/\d/g, '')).length;
          while (tildesIdx < tildesArray.length && !isLetter(tildesArray[tildesIdx])) { prefix += tildesArray[tildesIdx]; tildesIdx++; }
          let lettersConsumed = 0;
          while (lettersConsumed < baseLen && tildesIdx < tildesArray.length) {
              const charAt = tildesArray[tildesIdx];
              syllable += charAt; tildesIdx++;
              if (isLetter(charAt)) lettersConsumed++;
          }
      }
      result.push({ charIdx: i, prefix, syllable, isChinese });
  }
  let suffix = '';
  while (tildesIdx < tildesArray.length) { suffix += tildesArray[tildesIdx]; tildesIdx++; }
  if (suffix && result.length > 0) result[result.length - 1].suffix = suffix;
  return result;
};

const REGIMEN = {
  A: { valor: 1.0, modificadorDominio: 15 },
  B: { valor: 0.7, modificadorDominio: 5 },
  C: { valor: 0.4, modificadorDominio: -10 },
  D: { valor: 0.0, modificadorDominio: -25 }
};

const progresoService = {
  crearItemBase(id, tipo) {
    return { id, tipo, dominio: 0.0, estabilidadTemporal: 1.0, proximoRepasoTs: Date.now(), historial: [] };
  },
  evaluarEstricto(esCorrecto, tiempoMs, usoFlashcard, longitudEsperada = 1) {
    if (usoFlashcard) return { nota: REGIMEN.D, evento: "resolucion_asistida" };
    if (!esCorrecto) return { nota: REGIMEN.D, evento: "fallo_directo" };
    const tiempoLimite = 8000 + (longitudEsperada * 1000);
    if (tiempoMs > tiempoLimite) return { nota: REGIMEN.B, evento: "acierto_lento" };
    return { nota: REGIMEN.A, evento: "resolucion_autonoma" };
  },
  evaluarTolerante(usoSombra, usoPista, canceladoFlashcard) {
    if (canceladoFlashcard) return { nota: REGIMEN.D, evento: "salto_tras_consulta" };
    if (usoSombra) return { nota: REGIMEN.D, evento: "trazo_asistencia_maxima" };
    if (usoPista) return { nota: REGIMEN.C, evento: "trazo_asistencia_moderada" };
    return { nota: REGIMEN.A, evento: "trazo_limpio" };
  },
  calcularNuevoEstado(itemActual, evaluacion, tiempoMs) {
    const ahora = Date.now();
    let nuevoDominio = Math.max(0, Math.min(100, itemActual.dominio + (REGIMEN[evaluacion.nota.valor === 1.0 ? 'A' : evaluacion.nota.valor === 0.7 ? 'B' : evaluacion.nota.valor === 0.4 ? 'C' : 'D'].modificadorDominio * (1 / itemActual.estabilidadTemporal))));
    let nuevaEstabilidad = evaluacion.nota.valor >= 0.7 ? itemActual.estabilidadTemporal + 0.2 : Math.max(1.0, itemActual.estabilidadTemporal - 0.5);
    const horasParaRepaso = Math.pow(nuevaEstabilidad, 2) * 4;
    return { ...itemActual, dominio: nuevoDominio, estabilidadTemporal: nuevaEstabilidad, proximoRepasoTs: ahora + (horasParaRepaso * 3600000), historial: [...itemActual.historial, { ts: ahora, resultado: evaluacion.nota.valor, tiempoMs, evento: evaluacion.evento }] };
  }
};

class SessionManager {
  constructor() {
    this.colaOriginal = []; this.colaAdaptativa = []; this.sesionActual = null;
    this.registroProgreso = {}; this.userId = null;
  }
  async inicializarSesion(itemsSeleccionados, tiposConfig, conteo, userId) {
    this.userId = userId;
    const itemsGuardados = await storageAdapter.obtenerItems(userId);
    let pool = itemsSeleccionados.map(raw => {
      const tipo = Object.keys(tiposConfig).find(k => tiposConfig[k]) || 'esp';
      const globalId = `${raw.id}_${tipo}`;
      const itemData = itemsGuardados[globalId] || progresoService.crearItemBase(globalId, tipo);
      return { raw, itemData, tipo };
    });
    const ahora = Date.now();
    pool.sort((a, b) => {
      const aVencido = a.itemData.proximoRepasoTs < ahora;
      const bVencido = b.itemData.proximoRepasoTs < ahora;
      if (aVencido && !bVencido) return -1;
      if (!aVencido && bVencido) return 1;
      return a.itemData.dominio - b.itemData.dominio;
    });
    this.colaOriginal = pool.slice(0, conteo);
    this.colaAdaptativa = [...this.colaOriginal];
    this.sesionActual = { idSesion: `sess_${Date.now()}`, inicioTs: Date.now(), metricas: { autonomos: 0, asistencia: 0, saltados: 0, trazos: 0 }, itemsPracticados: [] };
    this.colaOriginal.forEach(i => { this.registroProgreso[i.itemData.id] = i.itemData; });
  }
  obtenerSiguiente() { return this.colaAdaptativa.length > 0 ? this.colaAdaptativa[0] : null; }
  async procesarRespuesta(evaluacion, tiempoMs) {
    const current = this.colaAdaptativa.shift();
    if (!current) return;
    if (evaluacion.evento.includes('autonoma') || evaluacion.evento.includes('limpio')) this.sesionActual.metricas.autonomos++;
    else if (evaluacion.evento.includes('salto')) this.sesionActual.metricas.saltados++;
    else this.sesionActual.metricas.asistencia++;
    if (!this.sesionActual.itemsPracticados.includes(current.itemData.id)) this.sesionActual.itemsPracticados.push(current.itemData.id);
    const nuevoEstado = progresoService.calcularNuevoEstado(current.itemData, evaluacion, tiempoMs);
    this.registroProgreso[current.itemData.id] = nuevoEstado;
    await storageAdapter.guardarItem(this.userId, nuevoEstado);
    if (evaluacion.nota.valor < 1.0) {
      let urgencia = 0;
      switch (evaluacion.evento) {
        case "salto_tras_consulta": urgencia = 6; break;
        case "resolucion_asistida": urgencia = 5; break;
        case "fallo_directo": urgencia = 4; break;
        case "trazo_asistencia_maxima": urgencia = 3; break;
        case "trazo_asistencia_moderada": urgencia = 2; break;
        case "acierto_lento": urgencia = 1; break;
      }
      current.urgenciaTemp = urgencia;
      this.colaAdaptativa.push(current);
      this.colaAdaptativa.sort((a, b) => (b.urgenciaTemp || 0) - (a.urgenciaTemp || 0));
    }
  }
  async cerrarSesion() {
    this.sesionActual.finTs = Date.now();
    await storageAdapter.guardarSesion(this.userId, this.sesionActual);
    return this.sesionActual;
  }
}

const AnimatedFlashcardFront = ({ text, hwLoaded }) => {
  const containerRef = useRef(null);
  const writersRef = useRef([]);
  const [isPlaying, setIsPlaying] = useState(false);
  const loopRef = useRef(false);

  useEffect(() => {
      if (!hwLoaded || !window.HanziWriter || !containerRef.current) return;
      containerRef.current.innerHTML = ''; writersRef.current = [];
      setIsPlaying(false); loopRef.current = false;
      const chars = text.split('');
      const size = chars.length > 5 ? 40 : (chars.length > 3 ? 55 : (chars.length > 1 ? 80 : 120));
      chars.forEach((char) => {
          const wrapper = document.createElement('div'); wrapper.className = "inline-flex items-center justify-center mx-1";
          if (/[\u4e00-\u9fa5]/.test(char)) {
              wrapper.style.width = `${size}px`; wrapper.style.height = `${size}px`;
              containerRef.current.appendChild(wrapper);
              const writer = window.HanziWriter.create(wrapper, char, { width: size, height: size, showCharacter: false, padding: 2, strokeAnimationSpeed: 1.5, delayBetweenStrokes: 50, drawingColor: '#1e293b' });
              writersRef.current.push(writer);
          } else {
              wrapper.innerText = char; wrapper.className = `inline-flex items-center justify-center mx-1 font-bold text-slate-800 ${size === 120 ? 'text-7xl' : (size === 80 ? 'text-6xl' : 'text-4xl')}`;
              containerRef.current.appendChild(wrapper); writersRef.current.push(null); 
          }
      });
      let isCancelled = false;
      const playOnce = async () => {
          const promises = writersRef.current.map(w => (w && typeof w.animateCharacter === 'function') ? w.animateCharacter() : Promise.resolve());
          await Promise.all(promises);
          if (!isCancelled && !loopRef.current) writersRef.current.forEach(w => { if (w && typeof w.showCharacter === 'function') w.showCharacter(); });
      };
      setTimeout(() => { if (!isCancelled) playOnce(); }, 300);
      return () => { isCancelled = true; writersRef.current.forEach(w => { if (w && typeof w.cancelAnimation === 'function') w.cancelAnimation(); }); };
  }, [text, hwLoaded]);

  useEffect(() => {
      let isCancelled = false;
      const playLoop = async () => {
          if (!loopRef.current || isCancelled) return;
          writersRef.current.forEach(w => { if (w && typeof w.hideCharacter === 'function') w.hideCharacter(); });
          const promises = writersRef.current.map(w => (w && typeof w.animateCharacter === 'function') ? w.animateCharacter() : Promise.resolve());
          await Promise.all(promises);
          if (loopRef.current && !isCancelled) setTimeout(() => { if (loopRef.current && !isCancelled) playLoop(); }, 800);
      };
      if (isPlaying) { loopRef.current = true; playLoop(); } 
      else { loopRef.current = false; writersRef.current.forEach(w => { if (w) { if (typeof w.cancelAnimation === 'function') w.cancelAnimation(); if (typeof w.showCharacter === 'function') w.showCharacter(); } }); }
      return () => { isCancelled = true; };
  }, [isPlaying]);

  return (
      <div className="flex flex-col items-center justify-center h-full w-full relative">
          <div ref={containerRef} className="flex flex-wrap justify-center items-center w-full min-h-[150px]"></div>
          <button onClick={(e) => { e.stopPropagation(); setIsPlaying(!isPlaying); }} className="absolute -bottom-2 right-0 p-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-colors shadow-md z-10 active:scale-95" title="Reproducir orden de trazos">
              {isPlaying ? <Square size={20} fill="currentColor" /> : <Play size={20} fill="currentColor" />}
          </button>
      </div>
  );
};

    const [idx, setIdx] = useState(0);

const ConversationPlay = ({ convItems, onFinish, currentUser, hwLoaded, showAlert }) => {
    const [rounds, setRounds] = useState([]);
    const [currentRoundIdx, setCurrentRoundIdx] = useState(0);
    const [chatHistory, setChatHistory] = useState([]);
    const [targetItem, setTargetItem] = useState(null);
    const [minigameMode, setMinigameMode] = useState('');
    const [roundSolved, setRoundSolved] = useState(false);
    const [constructorChars, setConstructorChars] = useState([]);
    const [selectedConstructorChars, setSelectedConstructorChars] = useState([]);
    const [inputValue, setInputValue] = useState('');
    const [showFlashcard, setShowFlashcard] = useState(false);
    const [haConsultadoFlashcard, setHaConsultadoFlashcard] = useState(false);
    const [feedback, setFeedback] = useState(null);
    const [startTime, setStartTime] = useState(Date.now());

    useEffect(() => {
        let rs = []; let i = 0;
        while(i < convItems.length) {
            const chunkSize = Math.floor(Math.random() * 3) + 2; 
            const chunk = convItems.slice(i, i + chunkSize);
            const tIdx = Math.floor(Math.random() * chunk.length);
            rs.push({ items: chunk, target: chunk[tIdx] });
            i += chunkSize;
        }
        setRounds(rs); iniciarRonda(rs[0], []);
    }, [convItems]);

    const iniciarRonda = (ronda, history) => {
        setChatHistory(history); setTargetItem(ronda.target); setRoundSolved(false);
        setShowFlashcard(false); setHaConsultadoFlashcard(false); setFeedback(null);
        setInputValue(''); setSelectedConstructorChars([]); setStartTime(Date.now());
        const modes = ['A', 'B', 'C', 'D']; setMinigameMode(modes[Math.floor(Math.random() * modes.length)]);
        if (minigameMode === 'A') {
            const correctArr = ronda.target.char.split('');
            const allChars = QUIZ_POOL_DATA.map(i => cleanPunctuation(i.char)).join('').split('');
            const distractors = [];
            for(let j=0; j<5; j++) distractors.push(allChars[Math.floor(Math.random() * allChars.length)] || '的');
            setConstructorChars([...correctArr, ...distractors].sort(() => 0.5 - Math.random()));
        }
    };

    const procesarResultado = async (isCorrect, flashcardUsed) => {
        const tiempoMs = Date.now() - startTime;
        let tipoProgreso = minigameMode === 'A' ? 'char' : (minigameMode === 'B' ? 'pinyin' : (minigameMode === 'C' ? 'esp' : 'stroke'));
        const globalId = `${targetItem.id}_${tipoProgreso}`;
        const itemsGuardados = await storageAdapter.obtenerItems(currentUser);
        const itemActual = itemsGuardados[globalId] || progresoService.crearItemBase(globalId, tipoProgreso);
        const evaluacion = progresoService.evaluarEstricto(isCorrect, tiempoMs, flashcardUsed, targetItem.char.length);
        await storageAdapter.guardarItem(currentUser, progresoService.calcularNuevoEstado(itemActual, evaluacion, tiempoMs));
        if (isCorrect || flashcardUsed) {
            setRoundSolved(true);
            setFeedback({ ok: isCorrect, msg: flashcardUsed ? `Frase revelada` : (evaluacion.nota.valor >= 0.7 ? "¡Excelente!" : "¡Bien! (Lento)") });
            setTimeout(() => { if (currentRoundIdx + 1 < rounds.length) { setCurrentRoundIdx(prev => prev + 1); iniciarRonda(rounds[currentRoundIdx + 1], [...chatHistory, ...rounds[currentRoundIdx].items]); } else onFinish(); }, 2000);
        } else { setFeedback({ ok: false, msg: "Reintenta..." }); setTimeout(() => setFeedback(null), 1200); }
    };

    const handleMinigameA = (char) => {
        const newVal = [...selectedConstructorChars, char];
        setSelectedConstructorChars(newVal);
        if (newVal.join('') === targetItem.char) procesarResultado(true, false);
        else if (newVal.length >= targetItem.char.length) {
            procesarResultado(false, false);
            setTimeout(() => setSelectedConstructorChars([]), 1000);
        }
    };

    const handleMinigameBC = () => {
        let isCorrect = false;
        if (minigameMode === 'B') isCorrect = comparePinyin(inputValue, targetItem.num);
        else if (minigameMode === 'C') isCorrect = checkEspAnswer(inputValue, targetItem.esp);
        procesarResultado(isCorrect, false);
    };

    if (rounds.length === 0 || !targetItem) return <div>Cargando...</div>;
    const currentRound = rounds[currentRoundIdx];
    const displayedBubbles = [...chatHistory, ...currentRound.items];
    let primerAutor = null;

    return (
        <div className="w-full flex flex-col items-center max-w-md h-[90vh] bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100">
            <div className="w-full bg-indigo-600 p-4 text-white flex items-center justify-between shadow-md z-20">
                <button onClick={onFinish} className="p-2 hover:bg-indigo-500 rounded-full transition-colors"><X size={20}/></button>
                <div className="text-center"><h3 className="font-black text-sm uppercase">{targetItem.tema}</h3><p className="text-[10px] opacity-70">Ronda {currentRoundIdx + 1} / {rounds.length}</p></div>
                <div className="w-10"></div>
            </div>
            <div className="w-full flex-grow bg-slate-50 p-4 overflow-y-auto flex flex-col gap-4 hide-scrollbar">
                {displayedBubbles.map((item, idx) => {
                    const match = item.subtema.match(/(.+) (\d+)/);
                    const author = match ? match[1] : item.subtema;
                    if (!primerAutor) primerAutor = author;
                    const isRight = author === primerAutor;
                    const isHidden = item.id === targetItem.id && !roundSolved;
                    return (
                        <div key={idx} className={`flex flex-col w-full animate-in slide-in-from-bottom-2 ${isRight ? 'items-end' : 'items-start'}`}>
                            <span className="text-[10px] font-bold text-slate-400 mb-1 px-2">{author}</span>
                            <div className={`p-4 rounded-3xl max-w-[85%] shadow-sm relative ${isRight ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-white text-slate-800 border border-slate-100 rounded-tl-sm'} ${isHidden ? 'border-2 border-dashed border-indigo-300 bg-indigo-50 !text-transparent' : ''}`}>
                                {isHidden ? <div className="flex gap-1 py-2 px-4"><div className="w-2 h-2 rounded-full bg-indigo-400 animate-bounce"></div><div className="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style={{animationDelay: '0.2s'}}></div><div className="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style={{animationDelay: '0.4s'}}></div></div> 
                                : <div><p className="text-xl font-black">{item.char}</p><p className={`text-xs mt-1 font-medium ${isRight ? 'text-indigo-200' : 'text-slate-500'}`}>{item.esp}</p></div>}
                            </div>
                        </div>
                    );
                })}
            </div>
            <div className="w-full bg-white p-6 shadow-2xl rounded-t-[32px] z-20 flex flex-col items-center">
                {showFlashcard ? (
                    <div className="w-full flex flex-col items-center animate-in zoom-in">
                        <FlashcardDisplay item={targetItem} isTutor={true} onTutorNext={() => { setShowFlashcard(false); setHaConsultadoFlashcard(true); }} hwLoaded={hwLoaded} showAlert={showAlert}/>
                    </div>
                ) : (
                    <>
                        <div className="w-full flex justify-between items-center mb-4">
                            <span className="text-xs font-black text-indigo-400 uppercase tracking-widest flex items-center gap-1"><Zap size={14}/> Completa la burbuja</span>
                            <button onClick={() => setShowFlashcard(true)} className="text-[10px] font-bold bg-rose-50 text-rose-600 px-3 py-1 rounded-full flex items-center gap-1 hover:bg-rose-100"><HelpCircle size={12}/> Ayuda</button>
                        </div>
                        {feedback && <div className={`w-full py-2 px-4 mb-4 rounded-xl text-center font-bold text-sm ${feedback.ok ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>{feedback.msg}</div>}
                        {minigameMode === 'A' && (
                            <div className="w-full">
                                <div className="min-h-[44px] w-full bg-slate-50 rounded-xl mb-4 flex items-center justify-center text-2xl font-black border border-slate-200">{selectedConstructorChars.join('')}</div>
                                <div className="flex flex-wrap justify-center gap-2">{constructorChars.map((c, i) => (<button key={i} onClick={() => handleMinigameA(c)} className="w-12 h-12 bg-white border-2 border-slate-100 rounded-xl text-2xl font-bold text-slate-700 shadow-sm hover:border-indigo-400 active:scale-95">{c}</button>))}</div>
                            </div>
                        )}
                        {(minigameMode === 'B' || minigameMode === 'C') && (
                            <div className="w-full flex flex-col gap-3">
                                <input autoFocus type="text" className="w-full p-4 text-center text-lg font-bold border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-400" placeholder={minigameMode === 'B' ? 'ej. ni3 hao3' : 'ej. hola'} value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleMinigameBC()}/>
                                <div className="flex gap-2">
                                    <button onClick={handleMinigameBC} className="flex-grow bg-indigo-600 text-white font-bold py-4 rounded-2xl active:scale-95">ENVIAR</button>
                                    {haConsultadoFlashcard && <button onClick={() => procesarResultado(false, true)} className="px-4 bg-slate-100 text-slate-400 font-bold rounded-2xl active:scale-95"><SkipForward size={20}/></button>}
                                </div>
                            </div>
                        )}
                        {minigameMode === 'D' && (
                            <div className="w-full flex flex-col items-center">
                                <BlindStrokeGame targetChar={targetItem.char} onComplete={() => procesarResultado(true, false)} hwLoaded={hwLoaded} />
                                {haConsultadoFlashcard && <button onClick={() => procesarResultado(false, true)} className="mt-4 w-full py-2 bg-slate-100 text-slate-400 font-bold rounded-xl active:scale-95 flex items-center justify-center gap-2"><SkipForward size={16}/> SALTAR</button>}
                            </div>
                        )}
                    </>
                )}
            </div>
        </div>
    );
};

const App = () => {
  const [users, setUsers] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [view, setView] = useState('LOADING'); 
  const [currentIdx, setCurrentIdx] = useState(0); 

  const initialLessonsState = UNIQUE_LESSONS.reduce((acc, l) => ({...acc, [l]: true}), {});
  const [config, setConfig] = useState({ count: 20, types: { char: true, pinyin: true, esp: true, stroke: true, dictado: true }, lessons: initialLessonsState });
  const sessionManagerRef = useRef(new SessionManager());
  const [currentStep, setCurrentStep] = useState(0);
  const [quizState, setQuizState] = useState(null); 
  const [feedback, setFeedback] = useState(null); 
  const [inputValue, setInputValue] = useState('');
  const [showFlashSearch, setShowFlashSearch] = useState(false);
  const [flashSearchValue, setFlashSearchValue] = useState('');
  const [tutorMode, setTutorMode] = useState(false);
  const seenInSessionRef = useRef(new Set());
  const [haConsultadoFlashcard, setHaConsultadoFlashcard] = useState(false);
  const startTimeRef = useRef(Date.now());
  const [strokeCharIdx, setStrokeCharIdx] = useState(0);
  const [showOutline, setShowOutline] = useState(false);
  const [showSuccess, setShowSuccess] = useState(false);
  const [usoSombraEnTrazo, setUsoSombraEnTrazo] = useState(false);
  const [usoPistaEnTrazo, setUsoPistaEnTrazo] = useState(false);
  const [hwLoaded, setHwLoaded] = useState(false);
  const writerRef = useRef(null);
  const successTimeoutRef = useRef(null);
  const [modal, setModal] = useState({ isOpen: false, type: '', text: '', defaultValue: '', onConfirm: null, onCancel: null });
  const [convList, setConvList] = useState([]);

  const showAlert = (text) => setModal({ isOpen: true, type: 'alert', text, onConfirm: () => setModal(m => ({...m, isOpen: false})) });
  const showPrompt = (text, defaultValue, onConfirm) => setModal({ isOpen: true, type: 'prompt', text, defaultValue, onConfirm: (val) => { onConfirm(val); setModal(m => ({...m, isOpen: false})); }, onCancel: () => setModal(m => ({...m, isOpen: false})) });
  const showConfirm = (text, onConfirm) => setModal({ isOpen: true, type: 'confirm', text, onConfirm: () => { onConfirm(); setModal(m => ({...m, isOpen: false})); }, onCancel: () => setModal(m => ({...m, isOpen: false})) });

  useEffect(() => {
    const init = async () => { const data = await storageAdapter.obtenerUsuarios(); setUsers(data.users); setCurrentUser(data.current); setView('START'); };
    init();
    if (!document.getElementById('hanzi-writer-script')) {
      const script = document.createElement('script'); script.id = 'hanzi-writer-script'; script.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js';
      script.onload = () => setHwLoaded(true); document.head.appendChild(script);
    } else setHwLoaded(true);
  }, []);

  const generateOptions = (correctItem, field) => {
    const distractors = QUIZ_POOL_DATA.filter(l => l[field] !== correctItem[field]).sort(() => 0.5 - Math.random()).slice(0, 4).map(l => l[field]);
    return [...distractors, correctItem[field]].sort(() => 0.5 - Math.random());
  };

  const prepareNextStepFromQueue = () => {
    const nextItemObj = sessionManagerRef.current.obtenerSiguiente();
    if (!nextItemObj) { setView('FIN'); return; }
    let { raw: item, tipo: format } = nextItemObj;
    setHaConsultadoFlashcard(false); startTimeRef.current = Date.now();
    setUsoPistaEnTrazo(false); setUsoSombraEnTrazo(false);
    if (!seenInSessionRef.current.has(item.id)) { setTutorMode(true); seenInSessionRef.current.add(item.id); } else setTutorMode(false);
    let isDictation = false; if (format === 'dictado') { isDictation = true; format = ['char', 'stroke', 'pinyin', 'esp'][Math.floor(Math.random() * 4)]; }
    
    const isEsp = Math.random() > 0.5;
    
    let quizData = { format, item, idInterno: nextItemObj.itemData.id, isDictation };
    setStrokeCharIdx(0); 
    if (format === 'char') { quizData.question = isDictation ? "Busca el carácter" : item.char; quizData.correctVal = isEsp ? item.esp : item.num; quizData.options = generateOptions(item, isEsp ? 'esp' : 'num'); quizData.isInput = false; }
    else if (format === 'pinyin') { quizData.question = isDictation ? "Escribe el pinyin" : (Math.random() > 0.5 ? item.char : getEspPrompt(item.esp)); quizData.correctVal = item.num; quizData.isInput = true; }
    else if (format === 'stroke') { quizData.question = isDictation ? "Dibuja el audio" : "Dibuja: " + getEspPrompt(item.esp); quizData.correctVal = item.char; quizData.isInput = false; }
    else { quizData.question = isDictation ? "Traducción" : (Math.random() > 0.5 ? item.tildes : item.char); quizData.correctVal = item.esp; quizData.isInput = Math.random() > 0.5; if (!quizData.isInput) quizData.options = generateOptions(item, 'esp'); }
    setQuizState(quizData); setInputValue(''); setFeedback(null);
  };

  useEffect(() => { if (quizState?.isDictation && !feedback && !tutorMode) { const timer = setTimeout(() => playAudio(quizState.item.char, 0.85, showAlert), 300); return () => clearTimeout(timer); } }, [quizState, feedback, tutorMode]);

  const handleAnswer = async (val) => {
    if (feedback) return;
    const tiempoMs = Date.now() - startTimeRef.current;
    let isCorrect = false; let evaluacion;
    if (quizState.format === 'stroke') {
        if (val === 'SALTAR') evaluacion = progresoService.evaluarTolerante(false, false, true); 
        else { evaluacion = progresoService.evaluarTolerante(usoSombraEnTrazo, usoPistaEnTrazo, haConsultadoFlashcard); isCorrect = true; }
    } else {
        const longitudEsperada = quizState.correctVal?.length || 1;
        if (val === 'SALTAR') evaluacion = progresoService.evaluarEstricto(false, tiempoMs, true, longitudEsperada); 
        else {
            isCorrect = quizState.isInput ? (quizState.format === 'pinyin' ? comparePinyin(val, quizState.correctVal) : checkEspAnswer(val, quizState.correctVal)) : val === quizState.correctVal;
            evaluacion = progresoService.evaluarEstricto(isCorrect, tiempoMs, haConsultadoFlashcard, longitudEsperada);
        }
    }
    await sessionManagerRef.current.procesarRespuesta(evaluacion, tiempoMs);
    let cleanTarget = (quizState.format === 'pinyin' || quizState.format === 'stroke') ? quizState.correctVal : parseEspAnswers(quizState.correctVal)[0];
    if (val === 'SALTAR') setFeedback({ isCorrect: false, msg: `Era: ${cleanTarget}`, showDetail: true });

const normalizeText = (str) => {
  if (!str) return "";
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¡!¿?]/g, "").trim().replace(/\s+/g, ' ');
};

const parseEspAnswers = (rawEsp) => {
  let text = rawEsp.replace(/\[.*?\]/g, '').trim();
  let alternatives = text.split('/').map(s => s.trim());
  const expandParentheses = (str) => {
      const match = /([\wáéíóúüñÁÉÍÓÚÜÑ]+)\s*\(([\wáéíóúüñÁÉÍÓÚÜÑ\s]+)\)/.exec(str);
      if (!match) return [str];
      const word = match[1]; const synonym = match[2];
      const before = str.substring(0, match.index); const after = str.substring(match.index + match[0].length);
      const opt1 = before + word + after; const opt2 = before + synonym + after;
      return [...expandParentheses(opt1), ...expandParentheses(opt2)];
  };
  let allValidOptions = [];
  alternatives.forEach(alt => { allValidOptions.push(...expandParentheses(alt)); });
  return allValidOptions.map(s => s.replace(/\s+/g, ' ').trim());
};

const checkEspAnswer = (input, targetRawEsp) => {
  const validOptions = parseEspAnswers(targetRawEsp);
  const normalizedInput = normalizeText(input);
  return validOptions.some(opt => normalizeText(opt) === normalizedInput);
};

const comparePinyin = (input, target) => {
  const clean = (s) => s.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¡!¿?]/g, "").split(/\s+/);
  const inputParts = clean(input); const targetParts = clean(target);
  if (inputParts.length !== targetParts.length) return inputParts.join('') === targetParts.join('');
  const getToneBase = (syllable) => {
      const match = syllable.match(/^([a-z]+)(\d)?$/);
      if (!match) return syllable;
      const word = match[1]; const tone = match[2];
      if (!tone || tone === '0' || tone === '5') return word + '0';
      return word + tone; 
  };
  return targetParts.every((t, i) => getToneBase(inputParts[i]) === getToneBase(t));
};

const formatFlashcardEsp = (rawEsp) => {
  if (!rawEsp) return { definitions: [], note: null };
  let text = rawEsp; let note = null;
  const bracketRegex = /\[(.*?)\]/g;
  const matches = [...text.matchAll(bracketRegex)];
  if (matches.length > 0) {
    note = matches.map(m => m[1].trim()).join(' | ');
    text = text.replace(bracketRegex, '').trim();
  }
  const definitions = text.split('/').map(s => s.trim()).filter(s => s !== '');
  return { definitions, note };
};

const getEspPrompt = (esp) => {
    const { definitions, note } = formatFlashcardEsp(esp);
    let prompt = definitions[0];
    if (note) prompt += ` [${note}]`;
    return prompt;
};

const playAudio = (text, rate = 0.85, showAlertFunc) => {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN'; utterance.rate = rate; 
        window.speechSynthesis.speak(utterance);
    } else if (showAlertFunc) { showAlertFunc("Audio no soportado."); }
};

const buildPinyinDisplayArray = (charStr, tildesStr, numStr) => {
  const chars = charStr.split('');
  const numSyllables = numStr.trim().split(' ');
  const tildesArray = Array.from(tildesStr.normalize('NFC'));
  let tildesIdx = 0;
  const result = [];
  const isLetter = (c) => /\p{L}/u.test(c);

  for (let i = 0; i < chars.length; i++) {
      const c = chars[i];
      const isChinese = /[\u4e00-\u9fa5]/.test(c);
      let prefix = ''; let syllable = '';
      if (isChinese) {
          const baseSyllable = numSyllables.shift() || '';
          const baseLen = Array.from(baseSyllable.replace(/\d/g, '')).length;
          while (tildesIdx < tildesArray.length && !isLetter(tildesArray[tildesIdx])) { prefix += tildesArray[tildesIdx]; tildesIdx++; }
          let lettersConsumed = 0;
          while (lettersConsumed < baseLen && tildesIdx < tildesArray.length) {
              const charAt = tildesArray[tildesIdx];
              syllable += charAt; tildesIdx++;
              if (isLetter(charAt)) lettersConsumed++;
          }
      }
      result.push({ charIdx: i, prefix, syllable, isChinese });
  }
  let suffix = '';
  while (tildesIdx < tildesArray.length) { suffix += tildesArray[tildesIdx]; tildesIdx++; }
  if (suffix && result.length > 0) result[result.length - 1].suffix = suffix;
  return result;
};

const getDynamicFontSize = (text) => {
    if (!text) return 'text-5xl';
    const len = text.length;
    if (len > 25) return 'text-xl md:text-2xl';
    if (len > 15) return 'text-2xl md:text-3xl';
    if (len > 8) return 'text-3xl md:text-4xl';
    if (len > 4) return 'text-4xl md:text-5xl';
    return 'text-5xl md:text-6xl';
};

        resolve({ users, current });
      }
    });
  },
  async guardarUsuarios(users, currentId) {
    localStorage.setItem('cn_app_users', JSON.stringify(users));
    if (currentId) localStorage.setItem('cn_app_current_user', currentId);
  },
  async obtenerItems(userId) {
    const data = localStorage.getItem(`cn_app_items_${userId}`);
    return data ? JSON.parse(data) : {};
  },
  async guardarItem(userId, item) {
    const data = JSON.parse(localStorage.getItem(`cn_app_items_${userId}`) || '{}');
    data[item.id] = item;
    localStorage.setItem(`cn_app_items_${userId}`, JSON.stringify(data));
  },
  async guardarSesion(userId, sesion) {
    const data = JSON.parse(localStorage.getItem(`cn_app_sessions_${userId}`) || '[]');
    data.push(sesion);
    localStorage.setItem(`cn_app_sessions_${userId}`, JSON.stringify(data));
  },
  async obtenerUltimaSesion(userId) {
    const data = JSON.parse(localStorage.getItem(`cn_app_sessions_${userId}`) || '[]');
    return data.length > 0 ? data[data.length - 1] : null;
  },
  async borrarProgreso(userId) {
    localStorage.removeItem(`cn_app_items_${userId}`);
    localStorage.removeItem(`cn_app_sessions_${userId}`);
  }
};

const REGIMEN = {
  A: { valor: 1.0, modificadorDominio: 15 },
  B: { valor: 0.7, modificadorDominio: 5 },
  C: { valor: 0.4, modificadorDominio: -10 },
  D: { valor: 0.0, modificadorDominio: -25 }
};

const progresoService = {
  crearItemBase(id, tipo) {
    return { id, tipo, dominio: 0.0, estabilidadTemporal: 1.0, proximoRepasoTs: Date.now(), historial: [] };
  },
  evaluarEstricto(esCorrecto, tiempoMs, usoFlashcard, longitudEsperada = 1) {
    if (usoFlashcard) return { nota: REGIMEN.D, evento: "resolucion_asistida" };
    if (!esCorrecto) return { nota: REGIMEN.D, evento: "fallo_directo" };
    const tiempoLimite = 8000 + (longitudEsperada * 1000);
    if (tiempoMs > tiempoLimite) return { nota: REGIMEN.B, evento: "acierto_lento" };
    return { nota: REGIMEN.A, evento: "resolucion_autonoma" };
  },
  evaluarTolerante(usoSombra, usoPista, canceladoFlashcard) {
    if (canceladoFlashcard) return { nota: REGIMEN.D, evento: "salto_tras_consulta" };
    if (usoSombra) return { nota: REGIMEN.D, evento: "trazo_asistencia_maxima" };
    if (usoPista) return { nota: REGIMEN.C, evento: "trazo_asistencia_moderada" };
    return { nota: REGIMEN.A, evento: "trazo_limpio" };
  },
  calcularNuevoEstado(itemActual, evaluacion, tiempoMs) {
    const ahora = Date.now();
    let nuevoDominio = Math.max(0, Math.min(100, itemActual.dominio + (REGIMEN[evaluacion.nota.valor === 1.0 ? 'A' : evaluacion.nota.valor === 0.7 ? 'B' : evaluacion.nota.valor === 0.4 ? 'C' : 'D'].modificadorDominio * (1 / itemActual.estabilidadTemporal))));
    let nuevaEstabilidad = evaluacion.nota.valor >= 0.7 ? itemActual.estabilidadTemporal + 0.2 : Math.max(1.0, itemActual.estabilidadTemporal - 0.5);
    const horasParaRepaso = Math.pow(nuevaEstabilidad, 2) * 4;
    return { ...itemActual, dominio: nuevoDominio, estabilidadTemporal: nuevaEstabilidad, proximoRepasoTs: ahora + (horasParaRepaso * 3600000), historial: [...itemActual.historial, { ts: ahora, resultado: evaluacion.nota.valor, tiempoMs, evento: evaluacion.evento }] };
  }
};

class SessionManager {
  constructor() {
    this.colaOriginal = []; this.colaAdaptativa = []; this.sesionActual = null;
    this.registroProgreso = {}; this.userId = null;
  }
  async inicializarSesion(itemsSeleccionados, tiposConfig, conteo, userId) {
    this.userId = userId;
    const itemsGuardados = await storageAdapter.obtenerItems(userId);
    let pool = itemsSeleccionados.map(raw => {
      const tipo = Object.keys(tiposConfig).find(k => tiposConfig[k]) || 'esp';
      const globalId = `${raw.id}_${tipo}`;
      const itemData = itemsGuardados[globalId] || progresoService.crearItemBase(globalId, tipo);
      return { raw, itemData, tipo };
    });
    const ahora = Date.now();
    pool.sort((a, b) => {
      const aVencido = a.itemData.proximoRepasoTs < ahora;
      const bVencido = b.itemData.proximoRepasoTs < ahora;
      if (aVencido && !bVencido) return -1;
      if (!aVencido && bVencido) return 1;
      return a.itemData.dominio - b.itemData.dominio;
    });
    this.colaOriginal = pool.slice(0, conteo);
    this.colaAdaptativa = [...this.colaOriginal];
    this.sesionActual = { idSesion: `sess_${Date.now()}`, inicioTs: Date.now(), metricas: { autonomos: 0, asistencia: 0, saltados: 0, trazos: 0 }, itemsPracticados: [] };
    this.colaOriginal.forEach(i => { this.registroProgreso[i.itemData.id] = i.itemData; });
  }
  obtenerSiguiente() { return this.colaAdaptativa.length > 0 ? this.colaAdaptativa[0] : null; }
  async procesarRespuesta(evaluacion, tiempoMs) {
    const current = this.colaAdaptativa.shift();
    if (!current) return;
    if (evaluacion.evento.includes('autonoma') || evaluacion.evento.includes('limpio')) this.sesionActual.metricas.autonomos++;
    else if (evaluacion.evento.includes('salto')) this.sesionActual.metricas.saltados++;
    else this.sesionActual.metricas.asistencia++;
    if (!this.sesionActual.itemsPracticados.includes(current.itemData.id)) this.sesionActual.itemsPracticados.push(current.itemData.id);
    const nuevoEstado = progresoService.calcularNuevoEstado(current.itemData, evaluacion, tiempoMs);
    this.registroProgreso[current.itemData.id] = nuevoEstado;
    await storageAdapter.guardarItem(this.userId, nuevoEstado);
    if (evaluacion.nota.valor < 1.0) {
      let urgencia = 0;
      switch (evaluacion.evento) {
        case "salto_tras_consulta": urgencia = 6; break;
        case "resolucion_asistida": urgencia = 5; break;
        case "fallo_directo": urgencia = 4; break;
        case "trazo_asistencia_maxima": urgencia = 3; break;
        case "trazo_asistencia_moderada": urgencia = 2; break;
        case "acierto_lento": urgencia = 1; break;
      }
      current.urgenciaTemp = urgencia;
      this.colaAdaptativa.push(current);
      this.colaAdaptativa.sort((a, b) => (b.urgenciaTemp || 0) - (a.urgenciaTemp || 0));
    }
  }
  async cerrarSesion() {
    this.sesionActual.finTs = Date.now();
    await storageAdapter.guardarSesion(this.userId, this.sesionActual);
    return this.sesionActual;
  }
}

const AnimatedFlashcardFront = ({ text, hwLoaded }) => {
  const containerRef = useRef(null);
  const writersRef = useRef([]);
  const [isPlaying, setIsPlaying] = useState(false);
  const loopRef = useRef(false);

  useEffect(() => {
      if (!hwLoaded || !window.HanziWriter || !containerRef.current) return;
      containerRef.current.innerHTML = ''; writersRef.current = [];
      setIsPlaying(false); loopRef.current = false;
      const chars = text.split('');
      const size = chars.length > 5 ? 40 : (chars.length > 3 ? 55 : (chars.length > 1 ? 80 : 120));
      chars.forEach((char) => {
          const wrapper = document.createElement('div'); wrapper.className = "inline-flex items-center justify-center mx-1";
          if (/[\u4e00-\u9fa5]/.test(char)) {
              wrapper.style.width = `${size}px`; wrapper.style.height = `${size}px`;
              containerRef.current.appendChild(wrapper);
              const writer = window.HanziWriter.create(wrapper, char, { width: size, height: size, showCharacter: false, padding: 2, strokeAnimationSpeed: 1.5, delayBetweenStrokes: 50, drawingColor: '#1e293b' });
              writersRef.current.push(writer);
          } else {
              wrapper.innerText = char; wrapper.className = `inline-flex items-center justify-center mx-1 font-bold text-slate-800 ${size === 120 ? 'text-7xl' : (size === 80 ? 'text-6xl' : 'text-4xl')}`;
              containerRef.current.appendChild(wrapper); writersRef.current.push(null); 
          }
      });
      let isCancelled = false;
      const playOnce = async () => {
          const promises = writersRef.current.map(w => (w && typeof w.animateCharacter === 'function') ? w.animateCharacter() : Promise.resolve());
          await Promise.all(promises);
          if (!isCancelled && !loopRef.current) writersRef.current.forEach(w => { if (w && typeof w.showCharacter === 'function') w.showCharacter(); });
      };
      setTimeout(() => { if (!isCancelled) playOnce(); }, 300);
      return () => { isCancelled = true; writersRef.current.forEach(w => { if (w && typeof w.cancelAnimation === 'function') w.cancelAnimation(); }); };
  }, [text, hwLoaded]);

  useEffect(() => {
      let isCancelled = false;
      const playLoop = async () => {
          if (!loopRef.current || isCancelled) return;
          writersRef.current.forEach(w => { if (w && typeof w.hideCharacter === 'function') w.hideCharacter(); });
          const promises = writersRef.current.map(w => (w && typeof w.animateCharacter === 'function') ? w.animateCharacter() : Promise.resolve());
          await Promise.all(promises);
          if (loopRef.current && !isCancelled) setTimeout(() => { if (loopRef.current && !isCancelled) playLoop(); }, 800);
      };
      if (isPlaying) { loopRef.current = true; playLoop(); } 
      else { loopRef.current = false; writersRef.current.forEach(w => { if (w) { if (typeof w.cancelAnimation === 'function') w.cancelAnimation(); if (typeof w.showCharacter === 'function') w.showCharacter(); } }); }
      return () => { isCancelled = true; };
  }, [isPlaying]);

  return (
      <div className="flex flex-col items-center justify-center h-full w-full relative">
          <div ref={containerRef} className="flex flex-wrap justify-center items-center w-full min-h-[150px]"></div>
          <button onClick={(e) => { e.stopPropagation(); setIsPlaying(!isPlaying); }} className="absolute -bottom-2 right-0 p-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-colors shadow-md z-10 active:scale-95" title="Reproducir orden de trazos">
              {isPlaying ? <Square size={20} fill="currentColor" /> : <Play size={20} fill="currentColor" />}
          </button>
      </div>
  );
};

const BlindStrokeGame = ({ targetChar, onComplete, hwLoaded }) => {
    const [idx, setIdx] = useState(0);
    const containerRef = useRef(null);
    const advance = () => { if (idx + 1 >= targetChar.length) { onComplete(); } else { setIdx(idx + 1); } };
    useEffect(() => {
        if (!hwLoaded || !targetChar || !containerRef.current) return;
        const char = targetChar[idx];
        if (!char) return;
        containerRef.current.innerHTML = '';
        if (!/[\u4e00-\u9fa5]/.test(char)) { advance(); return; }
        try {
            const writer = window.HanziWriter.create(containerRef.current, char, { width: 200, height: 200, showCharacter: false, showOutline: false, padding: 15, strokeAnimationSpeed: 1.5, delayBetweenStrokes: 150, highlightColor: '#3b82f6', drawingColor: '#1f2937' });
            if (writer && typeof writer.quiz === 'function') { writer.quiz({ onComplete: () => { setTimeout(() => advance(), 400); } }); }
        } catch (e) { advance(); }
    }, [idx, targetChar, hwLoaded]);
    return (
        <div className="w-full flex flex-col items-center">
            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Dibuja la frase (A ciegas)</p>
            <div ref={containerRef} style={{ width: '200px', height: '200px', backgroundImage: backgroundGridUrl, backgroundSize: 'cover', backgroundColor: '#fffaf0', touchAction: 'none' }} className="rounded-2xl shadow-inner overflow-hidden border border-slate-200"></div>
        </div>
    );
};

              <div className="bg-emerald-500 h-full" style={{ width: `${(ultimaSesion.metricas.autonomos / (ultimaSesion.metricas.autonomos + ultimaSesion.metricas.asistencia + ultimaSesion.metricas.saltados || 1)) * 100}%` }}></div>
              <div className="bg-amber-400 h-full" style={{ width: `${(ultimaSesion.metricas.asistencia / (ultimaSesion.metricas.autonomos + ultimaSesion.metricas.asistencia + ultimaSesion.metricas.saltados || 1)) * 100}%` }}></div>
              <div className="bg-rose-400 h-full" style={{ width: `${(ultimaSesion.metricas.saltados / (ultimaSesion.metricas.autonomos + ultimaSesion.metricas.asistencia + ultimaSesion.metricas.saltados || 1)) * 100}%` }}></div>

const ConversationPlay = ({ convItems, onFinish, currentUser, hwLoaded, showAlert }) => {
    const [rounds, setRounds] = useState([]);
    const [currentRoundIdx, setCurrentRoundIdx] = useState(0);
    const [chatHistory, setChatHistory] = useState([]);
    const [targetItem, setTargetItem] = useState(null);
    const [minigameMode, setMinigameMode] = useState('');
    const [roundSolved, setRoundSolved] = useState(false);
    const [constructorChars, setConstructorChars] = useState([]);
    const [selectedConstructorChars, setSelectedConstructorChars] = useState([]);
    const [inputValue, setInputValue] = useState('');
    const [showFlashcard, setShowFlashcard] = useState(false);
    const [haConsultadoFlashcard, setHaConsultadoFlashcard] = useState(false);
    const [feedback, setFeedback] = useState(null);
    const [startTime, setStartTime] = useState(Date.now());

    useEffect(() => {
        let rs = []; let i = 0;
        while(i < convItems.length) {
            const chunkSize = Math.floor(Math.random() * 3) + 2; 
            const chunk = convItems.slice(i, i + chunkSize);
            const tIdx = Math.floor(Math.random() * chunk.length);
            rs.push({ items: chunk, target: chunk[tIdx] });
            i += chunkSize;
        }
        setRounds(rs); iniciarRonda(rs[0], []);
    }, [convItems]);

    const iniciarRonda = (ronda, history) => {
        setChatHistory(history); setTargetItem(ronda.target); setRoundSolved(false);
        setShowFlashcard(false); setHaConsultadoFlashcard(false); setFeedback(null);
        setInputValue(''); setSelectedConstructorChars([]); setStartTime(Date.now());
        const modes = ['A', 'B', 'C', 'D']; setMinigameMode(modes[Math.floor(Math.random() * modes.length)]);
        if (minigameMode === 'A') {
            const correctArr = ronda.target.char.split('');
            const allChars = QUIZ_POOL_DATA.map(i => cleanPunctuation(i.char)).join('').split('');
            const distractors = [];
            for(let j=0; j<5; j++) distractors.push(allChars[Math.floor(Math.random() * allChars.length)] || '的');
            setConstructorChars([...correctArr, ...distractors].sort(() => 0.5 - Math.random()));
        }
    };

    const procesarResultado = async (isCorrect, flashcardUsed) => {
        const tiempoMs = Date.now() - startTime;
        let tipoProgreso = minigameMode === 'A' ? 'char' : (minigameMode === 'B' ? 'pinyin' : (minigameMode === 'C' ? 'esp' : 'stroke'));
        const globalId = `${targetItem.id}_${tipoProgreso}`;
        const itemsGuardados = await storageAdapter.obtenerItems(currentUser);
        const itemActual = itemsGuardados[globalId] || progresoService.crearItemBase(globalId, tipoProgreso);
        const evaluacion = progresoService.evaluarEstricto(isCorrect, tiempoMs, flashcardUsed, targetItem.char.length);
        await storageAdapter.guardarItem(currentUser, progresoService.calcularNuevoEstado(itemActual, evaluacion, tiempoMs));
        if (isCorrect || flashcardUsed) {
            setRoundSolved(true);
            setFeedback({ ok: isCorrect, msg: flashcardUsed ? `Frase revelada` : (evaluacion.nota.valor >= 0.7 ? "¡Excelente!" : "¡Bien! (Lento)") });
            setTimeout(() => { if (currentRoundIdx + 1 < rounds.length) { setCurrentRoundIdx(prev => prev + 1); iniciarRonda(rounds[currentRoundIdx + 1], [...chatHistory, ...rounds[currentRoundIdx].items]); } else onFinish(); }, 2000);
        } else { setFeedback({ ok: false, msg: "Reintenta..." }); setTimeout(() => setFeedback(null), 1200); }
    };

    const handleMinigameA = (char) => {
        const newVal = [...selectedConstructorChars, char];
        setSelectedConstructorChars(newVal);
        if (newVal.join('') === targetItem.char) procesarResultado(true, false);
        else if (newVal.length >= targetItem.char.length) {
            procesarResultado(false, false);
            setTimeout(() => setSelectedConstructorChars([]), 1000);
        }
    };

    const handleMinigameBC = () => {
        let isCorrect = false;
        if (minigameMode === 'B') isCorrect = comparePinyin(inputValue, targetItem.num);
        else if (minigameMode === 'C') isCorrect = checkEspAnswer(inputValue, targetItem.esp);
        procesarResultado(isCorrect, false);
    };

    if (rounds.length === 0 || !targetItem) return <div>Cargando...</div>;
    const currentRound = rounds[currentRoundIdx];
    const displayedBubbles = [...chatHistory, ...currentRound.items];
    let primerAutor = null;

    return (
        <div className="w-full flex flex-col items-center max-w-md h-[90vh] bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100">
            <div className="w-full bg-indigo-600 p-4 text-white flex items-center justify-between shadow-md z-20">
                <button onClick={onFinish} className="p-2 hover:bg-indigo-500 rounded-full transition-colors"><X size={20}/></button>
                <div className="text-center"><h3 className="font-black text-sm uppercase">{targetItem.tema}</h3><p className="text-[10px] opacity-70">Ronda {currentRoundIdx + 1} / {rounds.length}</p></div>
                <div className="w-10"></div>
            </div>
            <div className="w-full flex-grow bg-slate-50 p-4 overflow-y-auto flex flex-col gap-4 hide-scrollbar">
                {displayedBubbles.map((item, idx) => {
                    const match = item.subtema.match(/(.+) (\d+)/);
                    const author = match ? match[1] : item.subtema;
                    if (!primerAutor) primerAutor = author;
                    const isRight = author === primerAutor;
                    const isHidden = item.id === targetItem.id && !roundSolved;
                    return (
                        <div key={idx} className={`flex flex-col w-full animate-in slide-in-from-bottom-2 ${isRight ? 'items-end' : 'items-start'}`}>
                            <span className="text-[10px] font-bold text-slate-400 mb-1 px-2">{author}</span>
                            <div className={`p-4 rounded-3xl max-w-[85%] shadow-sm relative ${isRight ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-white text-slate-800 border border-slate-100 rounded-tl-sm'} ${isHidden ? 'border-2 border-dashed border-indigo-300 bg-indigo-50 !text-transparent' : ''}`}>
                                {isHidden ? <div className="flex gap-1 py-2 px-4"><div className="w-2 h-2 rounded-full bg-indigo-400 animate-bounce"></div><div className="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style={{animationDelay: '0.2s'}}></div><div className="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style={{animationDelay: '0.4s'}}></div></div> 
                                : <div><p className="text-xl font-black">{item.char}</p><p className={`text-xs mt-1 font-medium ${isRight ? 'text-indigo-200' : 'text-slate-500'}`}>{item.esp}</p></div>}
                            </div>
                        </div>
                    );
                })}
            </div>
            <div className="w-full bg-white p-6 shadow-2xl rounded-t-[32px] z-20 flex flex-col items-center">
                {showFlashcard ? (
                    <div className="w-full flex flex-col items-center animate-in zoom-in">
                        <FlashcardDisplay item={targetItem} isTutor={true} onTutorNext={() => { setShowFlashcard(false); setHaConsultadoFlashcard(true); }} hwLoaded={hwLoaded} showAlert={showAlert}/>
                    </div>
                ) : (
                    <>
                        <div className="w-full flex justify-between items-center mb-4">
                            <span className="text-xs font-black text-indigo-400 uppercase tracking-widest flex items-center gap-1"><Zap size={14}/> Completa la burbuja</span>
                            <button onClick={() => setShowFlashcard(true)} className="text-[10px] font-bold bg-rose-50 text-rose-600 px-3 py-1 rounded-full flex items-center gap-1 hover:bg-rose-100"><HelpCircle size={12}/> Ayuda</button>
                        </div>
                        {feedback && <div className={`w-full py-2 px-4 mb-4 rounded-xl text-center font-bold text-sm ${feedback.ok ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>{feedback.msg}</div>}
                        {minigameMode === 'A' && (
                            <div className="w-full">
                                <div className="min-h-[44px] w-full bg-slate-50 rounded-xl mb-4 flex items-center justify-center text-2xl font-black border border-slate-200">{selectedConstructorChars.join('')}</div>
                                <div className="flex flex-wrap justify-center gap-2">{constructorChars.map((c, i) => (<button key={i} onClick={() => handleMinigameA(c)} className="w-12 h-12 bg-white border-2 border-slate-100 rounded-xl text-2xl font-bold text-slate-700 shadow-sm hover:border-indigo-400 active:scale-95">{c}</button>))}</div>
                            </div>
                        )}
                        {(minigameMode === 'B' || minigameMode === 'C') && (
                            <div className="w-full flex flex-col gap-3">
                                <input autoFocus type="text" className="w-full p-4 text-center text-lg font-bold border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-400" placeholder={minigameMode === 'B' ? 'ej. ni3 hao3' : 'ej. hola'} value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleMinigameBC()}/>
                                <div className="flex gap-2">
                                    <button onClick={handleMinigameBC} className="flex-grow bg-indigo-600 text-white font-bold py-4 rounded-2xl active:scale-95">ENVIAR</button>
                                    {haConsultadoFlashcard && <button onClick={() => procesarResultado(false, true)} className="px-4 bg-slate-100 text-slate-400 font-bold rounded-2xl active:scale-95"><SkipForward size={20}/></button>}
                                </div>
                            </div>
                        )}
                        {minigameMode === 'D' && (
                            <div className="w-full flex flex-col items-center">
                                <BlindStrokeGame targetChar={targetItem.char} onComplete={() => procesarResultado(true, false)} hwLoaded={hwLoaded} />
                                {haConsultadoFlashcard && <button onClick={() => procesarResultado(false, true)} className="mt-4 w-full py-2 bg-slate-100 text-slate-400 font-bold rounded-xl active:scale-95 flex items-center justify-center gap-2"><SkipForward size={16}/> SALTAR</button>}
                            </div>
                        )}
                    </>
                )}
            </div>
        </div>
    );
};

const App = () => {
  const [users, setUsers] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [view, setView] = useState('LOADING'); 
  const [currentIdx, setCurrentIdx] = useState(0); 

  const initialLessonsState = UNIQUE_LESSONS.reduce((acc, l) => ({...acc, [l]: true}), {});
  const [config, setConfig] = useState({ count: 20, types: { char: true, pinyin: true, esp: true, stroke: true, dictado: true }, lessons: initialLessonsState });
  const sessionManagerRef = useRef(new SessionManager());
  const [currentStep, setCurrentStep] = useState(0);
  const [quizState, setQuizState] = useState(null); 
  const [feedback, setFeedback] = useState(null); 
  const [inputValue, setInputValue] = useState('');
  const [showFlashSearch, setShowFlashSearch] = useState(false);
  const [flashSearchValue, setFlashSearchValue] = useState('');
  const [tutorMode, setTutorMode] = useState(false);
  const seenInSessionRef = useRef(new Set());
  const [haConsultadoFlashcard, setHaConsultadoFlashcard] = useState(false);
  const startTimeRef = useRef(Date.now());
  const [strokeCharIdx, setStrokeCharIdx] = useState(0);
  const [showOutline, setShowOutline] = useState(false);
  const [showSuccess, setShowSuccess] = useState(false);
  const [usoSombraEnTrazo, setUsoSombraEnTrazo] = useState(false);
  const [usoPistaEnTrazo, setUsoPistaEnTrazo] = useState(false);
  const [hwLoaded, setHwLoaded] = useState(false);
  const writerRef = useRef(null);
  const successTimeoutRef = useRef(null);
  const [modal, setModal] = useState({ isOpen: false, type: '', text: '', defaultValue: '', onConfirm: null, onCancel: null });
  const [convList, setConvList] = useState([]);

  const showAlert = (text) => setModal({ isOpen: true, type: 'alert', text, onConfirm: () => setModal(m => ({...m, isOpen: false})) });
  const showPrompt = (text, defaultValue, onConfirm) => setModal({ isOpen: true, type: 'prompt', text, defaultValue, onConfirm: (val) => { onConfirm(val); setModal(m => ({...m, isOpen: false})); }, onCancel: () => setModal(m => ({...m, isOpen: false})) });
  const showConfirm = (text, onConfirm) => setModal({ isOpen: true, type: 'confirm', text, onConfirm: () => { onConfirm(); setModal(m => ({...m, isOpen: false})); }, onCancel: () => setModal(m => ({...m, isOpen: false})) });

  useEffect(() => {
    const init = async () => { const data = await storageAdapter.obtenerUsuarios(); setUsers(data.users); setCurrentUser(data.current); setView('START'); };
    init();
    if (!document.getElementById('hanzi-writer-script')) {
      const script = document.createElement('script'); script.id = 'hanzi-writer-script'; script.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js';
      script.onload = () => setHwLoaded(true); document.head.appendChild(script);
    } else setHwLoaded(true);
  }, []);

  const generateOptions = (correctItem, field) => {
    const distractors = QUIZ_POOL_DATA.filter(l => l[field] !== correctItem[field]).sort(() => 0.5 - Math.random()).slice(0, 4).map(l => l[field]);
    return [...distractors, correctItem[field]].sort(() => 0.5 - Math.random());
  };

  const prepareNextStepFromQueue = () => {
    const nextItemObj = sessionManagerRef.current.obtenerSiguiente();
    if (!nextItemObj) { setView('FIN'); return; }
    let { raw: item, tipo: format } = nextItemObj;
    setHaConsultadoFlashcard(false); startTimeRef.current = Date.now();
    setUsoPistaEnTrazo(false); setUsoSombraEnTrazo(false);
    if (!seenInSessionRef.current.has(item.id)) { setTutorMode(true); seenInSessionRef.current.add(item.id); } else setTutorMode(false);
    let isDictation = false; if (format === 'dictado') { isDictation = true; format = ['char', 'stroke', 'pinyin', 'esp'][Math.floor(Math.random() * 4)]; }
    
    const isEsp = Math.random() > 0.5;
    
    let quizData = { format, item, idInterno: nextItemObj.itemData.id, isDictation };
    setStrokeCharIdx(0); 
    if (format === 'char') { quizData.question = isDictation ? "Busca el carácter" : item.char; quizData.correctVal = isEsp ? item.esp : item.num; quizData.options = generateOptions(item, isEsp ? 'esp' : 'num'); quizData.isInput = false; }
    else if (format === 'pinyin') { quizData.question = isDictation ? "Escribe el pinyin" : (Math.random() > 0.5 ? item.char : getEspPrompt(item.esp)); quizData.correctVal = item.num; quizData.isInput = true; }
    else if (format === 'stroke') { quizData.question = isDictation ? "Dibuja el audio" : "Dibuja: " + getEspPrompt(item.esp); quizData.correctVal = item.char; quizData.isInput = false; }
    else { quizData.question = isDictation ? "Traducción" : (Math.random() > 0.5 ? item.tildes : item.char); quizData.correctVal = item.esp; quizData.isInput = Math.random() > 0.5; if (!quizData.isInput) quizData.options = generateOptions(item, 'esp'); }
    setQuizState(quizData); setInputValue(''); setFeedback(null);
  };

  useEffect(() => { if (quizState?.isDictation && !feedback && !tutorMode) { const timer = setTimeout(() => playAudio(quizState.item.char, 0.85, showAlert), 300); return () => clearTimeout(timer); } }, [quizState, feedback, tutorMode]);

  const handleAnswer = async (val) => {
    if (feedback) return;
    const tiempoMs = Date.now() - startTimeRef.current;
    let isCorrect = false; let evaluacion;
    if (quizState.format === 'stroke') {
        if (val === 'SALTAR') evaluacion = progresoService.evaluarTolerante(false, false, true); 
        else { evaluacion = progresoService.evaluarTolerante(usoSombraEnTrazo, usoPistaEnTrazo, haConsultadoFlashcard); isCorrect = true; }
    } else {
        const longitudEsperada = quizState.correctVal?.length || 1;
        if (val === 'SALTAR') evaluacion = progresoService.evaluarEstricto(false, tiempoMs, true, longitudEsperada); 
        else {
            isCorrect = quizState.isInput ? (quizState.format === 'pinyin' ? comparePinyin(val, quizState.correctVal) : checkEspAnswer(val, quizState.correctVal)) : val === quizState.correctVal;
            evaluacion = progresoService.evaluarEstricto(isCorrect, tiempoMs, haConsultadoFlashcard, longitudEsperada);
        }
    }
    await sessionManagerRef.current.procesarRespuesta(evaluacion, tiempoMs);
    let cleanTarget = (quizState.format === 'pinyin' || quizState.format === 'stroke') ? quizState.correctVal : parseEspAnswers(quizState.correctVal)[0];
    if (val === 'SALTAR') setFeedback({ isCorrect: false, msg: `Era: ${cleanTarget}`, showDetail: true });
    else if (isCorrect) {
      let msg = "¡Excelente!"; if (evaluacion.nota.valor === 0.7) msg = "¡Correcto! (Lento)"; else if (evaluacion.nota.valor <= 0.4) msg = "Bien (con ayuda)";
      setFeedback({ isCorrect: true, msg, showDetail: true });
    } else setFeedback({ isCorrect: false, msg: `Incorrecto. Era: ${cleanTarget}`, showDetail: true });
    setTimeout(() => { setCurrentStep(prev => prev + 1); prepareNextStepFromQueue(); }, 1800); 
  };

  const loadHanziWriter = () => {
    if (!hwLoaded || view !== 'QUIZ' || !quizState || quizState.format !== 'stroke' || tutorMode) return;
    const target = document.getElementById('character-target'); if (!target) return;
    target.innerHTML = ''; const phrase = quizState.item; if (!phrase || !phrase.char[strokeCharIdx]) return;
    const char = phrase.char[strokeCharIdx]; if (!/[\u4e00-\u9fa5]/.test(char)) { setStrokeCharIdx(prev => prev + 1); return; }
    try {
        writerRef.current = window.HanziWriter.create('character-target', char, { width: 220, height: 220, showCharacter: false, showOutline: showOutline, padding: 15, strokeAnimationSpeed: 1.5, delayBetweenStrokes: 150, highlightColor: '#3b82f6', drawingColor: '#1f2937' });
        if (writerRef.current && typeof writerRef.current.quiz === 'function') writerRef.current.quiz({ onComplete: () => { setShowSuccess(true); successTimeoutRef.current = setTimeout(() => { setShowSuccess(false); if (strokeCharIdx < phrase.char.length - 1) setStrokeCharIdx(prev => prev + 1); else handleAnswer(phrase.char); }, 800); } });
    } catch (e) { setStrokeCharIdx(prev => prev + 1); }
  };
  useEffect(() => { loadHanziWriter(); return () => clearTimeout(successTimeoutRef.current); }, [hwLoaded, view, currentStep, strokeCharIdx, quizState, showOutline, tutorMode]);

  const toggleOutline = () => {
    setUsoSombraEnTrazo(true); const nextState = !showOutline; setShowOutline(nextState);
    if (writerRef.current) { if (nextState && typeof writerRef.current.showOutline === 'function') writerRef.current.showOutline(); else if (!nextState && typeof writerRef.current.hideOutline === 'function') writerRef.current.hideOutline(); }
  };

  const strokeDisplayArray = useMemo(() => { if (quizState && quizState.format === 'stroke') return buildPinyinDisplayArray(quizState.item.char, quizState.item.tildes, quizState.item.num); return []; }, [quizState]);

  return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans selection:bg-indigo-100">

        {view === 'START' && (
