<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanyuAccess - 汉语学习</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .hide-scrollbar { scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
const { BookOpen, BarChart2, CheckCircle, XCircle, SkipForward, Home, RefreshCw, ChevronRight, ChevronLeft, Settings, Play, X, Edit3, Eye, EyeOff, HelpCircle, Eraser, Search, Square, Volume2, Volume1, TrendingUp, AlertTriangle, Zap, BrainCircuit, History, Users, UserPlus, Trash2, Edit2, ChevronDown, MessageCircle, Send } = lucide;

// ============================================================================
// DATOS
// ============================================================================
const RAW_DATA = [
  { id: 1, section: "Lección 1: Saludos", tema: "Saludos", subtema: "Básico", char: "你好", tildes: "nǐ hǎo", num: "ni3 hao3", esp: "Hola" },
  { id: 2, section: "Lección 1: Saludos", tema: "Saludos", subtema: "Plural", char: "你们好", tildes: "nǐmen hǎo", num: "ni3 men0 hao3", esp: "Hola a todos" },
  { id: 3, section: "Lección 2: Gracias", tema: "Cortesía", subtema: "Formal", char: "谢谢", tildes: "xièxie", num: "xie4 xie0", esp: "Gracias" },
  { id: 4, section: "Lección 2: Gracias", tema: "Cortesía", subtema: "Respuesta", char: "不客气", tildes: "bú kèqi", num: "bu2 ke4 qi0", esp: "De nada" },
  { id: 5, section: "Lección 1: Saludos", tema: "Despedidas", subtema: "Básico", char: "再见", tildes: "zàijiàn", num: "zai4 jian4", esp: "Adiós" },
];

const CONVERSATION_DATA = [
  { id: 100, section: "Conversaciones", tema: "Conversación 1.1", subtema: "A 1", char: "你好！", tildes: "Nǐ hǎo!", num: "ni3 hao3", esp: "¡Hola!" },
  { id: 101, section: "Conversaciones", tema: "Conversación 1.2", subtema: "B 1", char: "你好！", tildes: "Nǐ hǎo!", num: "ni3 hao3", esp: "¡Hola!" },
];

const QUIZ_POOL_DATA = [...RAW_DATA, ...CONVERSATION_DATA];
const UNIQUE_LESSONS = [...new Set(RAW_DATA.map(item => item.section))];

// ============================================================================
// UTILIDADES
// ============================================================================
const normalizeText = (str) => {
  if (!str) return "";
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,\/#!$%\^\&\*;:{}=\-_`~()¡!¿?]/g, "").trim().replace(/\s+/g, ' ');
};

const parseEspAnswers = (rawEsp) => {
  let text = rawEsp.replace(/\[.*?\]/g, '').trim();
  let alternatives = text.split('/').map(s => s.trim());
  return alternatives;
};

const checkEspAnswer = (input, targetRawEsp) => {
  const validOptions = parseEspAnswers(targetRawEsp);
  const normalizedInput = normalizeText(input);
  return validOptions.some(opt => normalizeText(opt) === normalizedInput);
};

const playAudio = (text, rate = 0.85) => {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = rate;
    window.speechSynthesis.speak(utterance);
  }
};

// ============================================================================
// COMPONENTES
// ============================================================================
const FlashcardBack = ({ item }) => (
  <div className="absolute inset-0 bg-indigo-600 flex flex-col items-center justify-center p-8 text-white text-center rounded-[40px]">
    <h3 className="text-4xl font-black mb-1">{item.tildes}</h3>
    <p className="text-xl opacity-70 uppercase font-mono mb-6 tracking-widest">{item.num}</p>
    <div className="h-px w-24 bg-white/30 mb-6"></div>
    <p className="text-2xl font-bold italic">{item.esp}</p>
  </div>
);

const FlashcardDisplay = ({ item, isTutor, onTutorNext }) => {
  const [showReverso, setShowReverso] = useState(false);

  useEffect(() => {
    setShowReverso(false);
    playAudio(item.char, 0.85);
  }, [item]);

  return (
    <div className="w-full flex flex-col items-center justify-center">
      <div onClick={() => setShowReverso(!showReverso)} className="bg-white h-[450px] w-full max-w-[350px] rounded-[40px] shadow-2xl border-4 border-white flex items-center justify-center p-8 cursor-pointer relative overflow-hidden group transition-all active:scale-[0.98]">
        <button onClick={(e) => { e.stopPropagation(); playAudio(item.char, 0.85); }} className="absolute top-4 right-4 p-3 bg-slate-100 hover:bg-indigo-100 text-slate-400 rounded-full transition-colors z-20">
          <Volume2 size={22} />
        </button>
        
        <div className={`text-center transition-all duration-500 w-full h-full flex flex-col justify-center items-center ${showReverso ? 'scale-75 opacity-10' : 'scale-100'}`}>
          <p className="text-6xl font-black text-indigo-600">{item.char}</p>
          <p className="text-indigo-400 font-bold absolute bottom-2 left-0 right-0 mx-auto text-center uppercase tracking-[0.3em] text-[10px] animate-pulse">Toca para voltear</p>
        </div>
        
        {showReverso && <FlashcardBack item={item} />}
      </div>
      
      {isTutor && (
        <button onClick={onTutorNext} className="mt-8 py-4 px-12 rounded-3xl bg-indigo-600 text-white font-black flex items-center justify-center gap-3 shadow-xl hover:bg-indigo-700 active:scale-95 transition-all w-full max-w-[350px]">
          <span className="uppercase tracking-widest text-sm">Entendido</span>
          <CheckCircle size={24} />
        </button>
      )}
    </div>
  );
};

// ============================================================================
// APP PRINCIPAL
// ============================================================================
const App = () => {
  const [view, setView] = useState('START');
  const [currentIdx, setCurrentIdx] = useState(0);
  const [config, setConfig] = useState({
    count: 10,
    lessons: UNIQUE_LESSONS.reduce((acc, l) => ({ ...acc, [l]: true }), {})
  });

  const handleStartQuiz = () => {
    setView('FLASH');
    setCurrentIdx(0);
  };

  const handleNext = () => {
    if (currentIdx + 1 < QUIZ_POOL_DATA.length) {
      setCurrentIdx(currentIdx + 1);
    } else {
      setView('START');
    }
  };

  return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans">
      <div className="max-w-md w-full relative flex justify-center">
        
        {view === 'START' && (
          <div className="bg-white rounded-[40px] shadow-2xl p-10 text-center flex flex-col items-center gap-6 border border-white w-full animate-in slide-in-from-bottom duration-500">
            <div className="w-24 h-24 bg-indigo-600 rounded-[30px] flex items-center justify-center text-white shadow-xl">
              <BookOpen size={48} />
            </div>
            <div>
              <h1 className="text-4xl font-extrabold text-slate-800 tracking-tight">HanyuAccess</h1>
              <p className="text-slate-500 mt-2">Sistema Maestro de Léxico Chino</p>
            </div>
            <div className="flex flex-col gap-3 w-full mt-4">
              <button onClick={handleStartQuiz} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-[24px] shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-3 active:scale-95">
                <Play size={20} fill="white" />
                Comenzar Práctica
              </button>
              <button className="w-full bg-blue-500 text-white font-bold py-4 rounded-[24px] shadow-lg hover:bg-blue-600 transition-all flex items-center justify-center gap-3 active:scale-95">
                <MessageCircle size={20} fill="white" />
                Modo Conversación
              </button>
            </div>
          </div>
        )}

        {view === 'FLASH' && QUIZ_POOL_DATA[currentIdx] && (
          <div className="w-full flex flex-col items-center gap-8 animate-in slide-in-from-bottom duration-500">
            <div className="text-white text-center">
              <p className="text-sm opacity-70">Elemento {currentIdx + 1} de {QUIZ_POOL_DATA.length}</p>
            </div>
            
            <FlashcardDisplay 
              item={QUIZ_POOL_DATA[currentIdx]} 
              isTutor={false}
              onTutorNext={handleNext}
            />
            
            <button onClick={handleNext} className="py-3 px-8 rounded-3xl bg-white text-indigo-600 font-bold shadow-lg hover:bg-slate-50 transition-all active:scale-95">
              Siguiente →
            </button>
            
            <button onClick={() => setView('START')} className="py-2 px-6 rounded-2xl bg-white/20 text-white font-bold hover:bg-white/30 transition-all">
              Volver al inicio
            </button>
          </div>
        )}

      </div>
    </div>
  );
};

// ============================================================================
// RENDER
// ============================================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

    </script>
</body>
</html>
