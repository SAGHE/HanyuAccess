            <div className="w-24 h-24 bg-indigo-600 rounded-[30px] flex items-center justify-center text-white shadow-xl rotate-3 animate-bounce-slow"><BookOpen size={48} /></div>
            <div><h1 className="text-4xl font-extrabold text-slate-800 tracking-tight">Quiz Chino</h1><p className="text-slate-500 mt-2">Sistema Maestro de Léxico</p></div>
            <div className="flex flex-col gap-3 w-full mt-4">
              <button onClick={() => setView('CONFIG')} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-[24px] shadow-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-3 active:scale-95"><Play size={20} fill="white" /> Práctica Regular</button>
              <button onClick={() => setView('CONV_LIST')} className="w-full bg-blue-500 text-white font-bold py-4 rounded-[24px] shadow-lg hover:bg-blue-600 transition-all flex items-center justify-center gap-3 active:scale-95"><MessageCircle size={20} fill="white" /> Modo Conversación</button>
              <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => { setView('FLASH'); setCurrentIdx(0); }} className="w-full bg-white border-2 border-slate-200 text-slate-600 font-bold py-3 rounded-[24px] hover:bg-slate-50 transition-all active:scale-95 flex items-center justify-center gap-2 text-sm"><RefreshCw size={16} /> Flashcards</button>
                  <button onClick={() => setView('MENU')} className="w-full bg-white border-2 border-slate-200 text-slate-600 font-bold py-3 rounded-[24px] hover:bg-slate-50 transition-all active:scale-95 flex items-center justify-center gap-2 text-sm"><BarChart2 size={16} /> Progreso</button>
              </div>
            </div>
          </div>
        )}
        {view === 'CONV_LIST' && (
          <div className="bg-white rounded-[40px] shadow-2xl p-6 flex flex-col gap-4 animate-in slide-in-from-bottom duration-500 w-full max-w-md relative overflow-hidden h-[80vh]">
             <div className="flex items-center justify-between mb-4"><button onClick={() => setView('START')} className="p-2 text-slate-400 hover:text-indigo-600"><Home size={28} /></button><h2 className="text-xl font-black text-slate-800 tracking-tight flex items-center gap-2"><MessageCircle/> Conversaciones</h2><div className="w-10"></div></div>
             <div className="flex-grow overflow-y-auto flex flex-col gap-3 hide-scrollbar px-2">{Object.keys(CONVERSATIONS_MAP).map(convId => (<button key={convId} onClick={() => { setConvList(CONVERSATIONS_MAP[convId]); setView('CONV_PLAY'); }} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-left hover:border-indigo-400 active:scale-95 group"><div className="flex justify-between items-center"><span className="font-bold text-slate-700 group-hover:text-indigo-700">Conversación {convId}</span><ChevronRight size={20} className="text-slate-300 group-hover:text-indigo-500" /></div><p className="text-xs text-slate-400 mt-1">{CONVERSATIONS_MAP[convId].length} diálogos</p></button>))}</div>
          </div>
        )}
        {view === 'CONV_PLAY' && <ConversationPlay convItems={convList} onFinish={() => setView('START')} currentUser={currentUser} hwLoaded={hwLoaded} showAlert={showAlert} />}
        {view === 'CONFIG' && (
          <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div className="bg-white w-full max-w-md rounded-[32px] shadow-2xl overflow-hidden animate-in zoom-in duration-300">
              <div className="bg-indigo-600 p-6 text-white flex justify-between items-center font-bold"><h3>Configurar Sesión</h3><button onClick={() => setView('START')}><X size={20} /></button></div>
              <div className="p-6 space-y-6">
                <div><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Ejercicios Iniciales</p><div className="flex gap-2">{[10, 20, 30].map(n => <button key={n} onClick={() => setConfig(c => ({...c, count: n}))} className={`flex-1 py-2 rounded-xl font-bold transition-all ${config.count === n ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{n}</button>)}</div></div>
                <div><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Habilidades</p><div className="grid grid-cols-2 gap-2">{Object.entries({ char: 'Carácter', pinyin: 'Pinyin', esp: 'Español', stroke: 'Trazos', dictado: 'Dictado' }).map(([k, label]) => (<label key={k} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer"><input type="checkbox" checked={config.types[k]} onChange={() => setConfig(c => ({...c, types: {...c.types, [k]: !c.types[k]}}))} className="w-5 h-5 accent-indigo-600 rounded" /><span>{label}</span></label>))}</div></div>
                <div><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Lecciones</p><div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto hide-scrollbar">{UNIQUE_LESSONS.map(l => (<button key={l} onClick={() => setConfig(c => ({...c, lessons: {...c.lessons, [l]: !c.lessons[l]}}))} className={`px-3 py-1 rounded-full text-[10px] font-bold border-2 transition-all ${config.lessons[l] ? 'bg-indigo-100 border-indigo-200 text-indigo-600' : 'bg-white text-slate-300'}`}>{l}</button>))}</div></div>
                <button onClick={async () => { let pool = QUIZ_POOL_DATA.filter(l => config.lessons[l.section]); if (!pool.length) return showAlert("Elige lecciones."); await sessionManagerRef.current.inicializarSesion(pool, config.types, config.count, currentUser); seenInSessionRef.current = new Set(); prepareNextStepFromQueue(); setView('QUIZ'); }} className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95">Empezar Misión</button>
              </div>
            </div>
          </div>
        )}
        {view === 'QUIZ' && quizState && (
          <div className="flex flex-col gap-4 animate-in fade-in duration-500 w-full max-w-md">
            <div className="flex justify-between items-center px-4"><button onClick={() => setView('START')} className="text-slate-400 hover:text-indigo-600"><Home size={24}/></button><div className="flex flex-col items-center"><div className="w-32 h-2 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${(Math.min(currentStep, config.count) / config.count) * 100}%` }} /></div><span className="text-[10px] font-bold text-slate-400 mt-1">{sessionManagerRef.current.colaAdaptativa.length} restantes</span></div><button onClick={async () => { await sessionManagerRef.current.cerrarSesion(); setView('MENU'); }} className="text-xs font-bold text-red-400 uppercase">Fin</button></div>
            {tutorMode ? <div className="animate-in zoom-in duration-500 mt-4 text-center"><h2 className="text-sm font-black text-indigo-500 mb-4 flex items-center gap-2 uppercase tracking-widest bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100 inline-block"><BookOpen size={18} /> Conoce la Frase</h2><FlashcardDisplay key={`tutor-${quizState.item.id}`} item={quizState.item} isTutor={true} onTutorNext={() => setTutorMode(false)} hwLoaded={hwLoaded} showAlert={showAlert} /></div>
            : <div className="bg-white rounded-[40px] shadow-2xl p-6 min-h-[500px] flex flex-col justify-between border border-white relative overflow-hidden text-center">
                  <div className="flex-grow flex flex-col items-center justify-center gap-6 mt-4 z-10 relative">
                    <div className="w-full space-y-2 px-2 flex flex-col items-center">
                        {quizState.isDictation ? <div className="bg-indigo-50 p-6 rounded-3xl w-full border-2 border-indigo-100"><div className="flex items-center justify-center gap-4"><button onClick={() => playAudio(quizState.item.char, 0.85, showAlert)} disabled={!!feedback} className="w-16 h-16 bg-indigo-600 text-white rounded-full shadow-lg active:scale-95"><Volume2 size={32} /></button><div className="flex flex-col gap-2"><button onClick={() => playAudio(quizState.item.char, 0.4, showAlert)} disabled={!!feedback} className="px-4 py-2 bg-white text-indigo-600 font-bold text-xs rounded-xl border border-indigo-100"><Volume1 size={14} /> Lento</button><button onClick={() => { if(!feedback){setHaConsultadoFlashcard(true); setTutorMode(true);} }} disabled={!!feedback} className="px-4 py-2 font-bold text-xs rounded-xl bg-rose-50 text-rose-600 border border-rose-100"><HelpCircle size={14} /> Flashcard</button></div></div><span className="text-sm font-bold text-slate-500 mt-4 block">{quizState.question}</span></div>
                        : <h3 onClick={() => { if(!feedback){setHaConsultadoFlashcard(true); setTutorMode(true);} }} className={`font-black text-slate-800 break-words ${!feedback ? 'cursor-pointer hover:text-indigo-600' : ''} ${getDynamicFontSize(quizState.question)}`}>{quizState.question}</h3>}
                        {feedback?.showDetail && (<div className="text-indigo-500 font-bold animate-in zoom-in mt-2"><p className="text-xl">{quizState.item.tildes}</p><p className="text-sm opacity-60">{quizState.item.num}</p>{quizState.isDictation && <p className="text-2xl font-black text-slate-800 mt-2">{quizState.item.char}</p>}</div>)}
                    </div>
                    {quizState.format === 'stroke' ? (<div className="w-full flex flex-col items-center"><div id="character-target" style={{ width: '220px', height: '220px', backgroundImage: backgroundGridUrl, backgroundSize: 'cover', backgroundColor: '#fffaf0' }} className="rounded-lg shadow-inner overflow-hidden relative">{showSuccess && <div className="absolute inset-0 bg-emerald-500 bg-opacity-90 rounded-lg text-white text-3xl font-bold flex items-center justify-center">¡Excelente!</div>}</div><div className="flex justify-center gap-4 mt-6"><button onClick={toggleOutline} className={`p-3 rounded-2xl shadow-sm ${showOutline ? 'bg-indigo-50 text-indigo-700' : 'bg-slate-200 text-slate-500'}`}><Eye size={24} /></button><button onClick={() => { setUsoPistaEnTrazo(true); if(writerRef.current) writerRef.current.animateCharacter(); }} className="p-3 bg-blue-50 text-blue-600 rounded-2xl"><HelpCircle size={24} /></button></div></div>)
                    : quizState.isInput ? (<div className="w-full space-y-3"><input autoFocus type="text" className="w-full p-5 text-center text-2xl border-2 border-slate-100 rounded-3xl outline-none focus:border-indigo-400" placeholder="..." value={inputValue} onChange={e => setInputValue(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAnswer(inputValue)} disabled={!!feedback}/><button onClick={() => handleAnswer(inputValue)} disabled={!!feedback} className="w-full bg-indigo-600 text-white font-bold py-5 rounded-3xl shadow-lg active:scale-95">COMPROBAR</button></div>)
                    : (<div className="w-full grid grid-cols-1 gap-2">{quizState.options.map((opt, i) => (<button key={i} onClick={() => handleAnswer(opt)} disabled={!!feedback} className="p-4 text-left border-2 border-slate-100 rounded-2xl font-bold text-slate-600 hover:bg-indigo-50">{parseEspAnswers(opt)[0] || opt}</button>))}</div>)}
                  </div>
                  <div className="mt-8 h-[48px]">{(!feedback || haConsultadoFlashcard) && <button onClick={() => handleAnswer('SALTAR')} disabled={!!feedback} className="w-full bg-slate-100 text-slate-400 font-bold py-3 rounded-xl flex items-center justify-center gap-2"><SkipForward size={16} /> SALTAR</button>}</div>
                  {feedback && <div className={`absolute bottom-0 left-0 w-full min-h-[104px] p-6 flex flex-col items-center justify-center text-white font-bold animate-in slide-in-from-bottom shadow-2xl ${feedback.isCorrect ? 'bg-emerald-500' : 'bg-rose-500'}`}><span className="text-xl">{feedback.msg}</span></div>}
                </div>}
          </div>
        )}
        {view === 'MENU' && <DashboardProgreso onVolver={() => setView('START')} users={users} currentUser={currentUser} setUsers={setUsers} setCurrentUser={setCurrentUser} showAlert={showAlert} showPrompt={showPrompt} showConfirm={showConfirm} />}
        {view === 'FLASH' && FLASH_DATA[currentIdx] && (
            <div className="flex flex-col gap-4 animate-in fade-in duration-500 w-full max-w-[350px]">
                <div className="flex items-center justify-between mb-2"><button onClick={() => setView('START')} className="p-2 text-slate-400 hover:text-indigo-600"><Home size={28} /></button><span className="text-lg font-black text-slate-400 bg-slate-200 px-3 py-1 rounded-full">#{FLASH_DATA[currentIdx].id}</span><div className="relative min-w-[44px] flex justify-end">{showFlashSearch ? <input autoFocus type="number" className="w-20 px-3 py-1 rounded-full text-sm font-bold border-2 border-indigo-400" placeholder="N°..." value={flashSearchValue} onChange={e => setFlashSearchValue(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') { const foundIndex = FLASH_DATA.findIndex(item => item.id === parseInt(flashSearchValue, 10)); if (foundIndex !== -1) setCurrentIdx(foundIndex); else showAlert("No encontrado."); setShowFlashSearch(false); setFlashSearchValue(''); } }} onBlur={() => setShowFlashSearch(false)} /> : <button onClick={() => setShowFlashSearch(true)} className="p-2 bg-slate-200 rounded-full"><Search size={20} /></button>}</div></div>
                <div className="w-full text-center mb-2"><span className="inline-block bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider truncate max-w-full">{FLASH_DATA[currentIdx].section}</span></div>
                <FlashcardDisplay key={`flash-${FLASH_DATA[currentIdx].id}`} item={FLASH_DATA[currentIdx]} isTutor={false} hwLoaded={hwLoaded} showAlert={showAlert} />
                <div className="grid grid-cols-2 gap-4 mt-2"><button onClick={() => currentIdx > 0 && setCurrentIdx(currentIdx - 1)} disabled={currentIdx <= 0} className="py-5 rounded-3xl border-2 flex items-center justify-center gap-3 bg-white disabled:opacity-50"><ChevronLeft size={24} /> ATRÁS</button><button onClick={() => currentIdx < FLASH_DATA.length - 1 && setCurrentIdx(currentIdx + 1)} disabled={currentIdx >= FLASH_DATA.length - 1} className="py-5 rounded-3xl font-black bg-indigo-600 text-white active:scale-95 disabled:opacity-50">SIGUIENTE <ChevronRight size={24} className="inline"/></button></div>
            </div>
        )}
        {view === 'FIN' && <DashboardProgreso onVolver={() => setView('START')} users={users} currentUser={currentUser} setUsers={setUsers} setCurrentUser={setCurrentUser} showAlert={showAlert} showPrompt={showPrompt} showConfirm={showConfirm} />}
      </div>

      {modal.isOpen && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => modal.type === 'alert' ? modal.onConfirm() : modal.onCancel()}></div>
          <div className="bg-white rounded-3xl p-6 shadow-2xl w-full max-w-sm relative animate-in zoom-in-95 duration-200"><p className="text-slate-800 font-bold text-lg mb-4 text-center leading-snug">{modal.text}</p>{modal.type === 'prompt' && <input autoFocus type="text" className="w-full p-4 mb-4 bg-slate-50 text-slate-800 rounded-xl outline-none border-2 border-slate-200 focus:border-indigo-400 text-center" defaultValue={modal.defaultValue} id="custom-prompt-input" onKeyDown={e => e.key === 'Enter' && modal.onConfirm(e.target.value)} />}<div className="flex gap-3">{(modal.type === 'prompt' || modal.type === 'confirm') && <button onClick={modal.onCancel} className="flex-1 py-3 rounded-xl font-bold text-slate-500 bg-slate-100">Cancelar</button>}<button onClick={() => modal.type === 'prompt' ? modal.onConfirm(document.getElementById('custom-prompt-input').value) : modal.onConfirm()} className="flex-1 py-3 rounded-xl font-bold text-white bg-indigo-600">Aceptar</button></div></div>
        </div>
      )}

      <style>{`
        @keyframes bounce-slow { 0%, 100% { transform: translateY(-5%) rotate(3deg); } 50% { transform: translateY(0) rotate(3deg); } }
        .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      `}</style>
    </div>
  );
};

export default App;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
